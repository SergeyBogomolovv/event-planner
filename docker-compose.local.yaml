services:
  postgres:
    image: postgres:16-alpine
    container_name: event-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: event_planner
      POSTGRES_USER: event_planner
      POSTGRES_PASSWORD: event_planner
    ports:
      - "5432:5432"
    volumes:
      - event_planner_postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U event_planner -d event_planner" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: event-planner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - event_planner_redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  event_planner_postgres:
  event_planner_redis:
